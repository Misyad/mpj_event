# GitLab CI/CD Pipeline for MPJ Event (Next.js)
image: node:20

stages:
  - build
  - lint
  # - deploy # Dibuka jika server tujuan siap

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - .next/cache/

# Stage: Build
# Memastikan kode bisa dicompile dan TypeScript tidak error
build_job:
  stage: build
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 week
  only:
    - main
    - merge_requests

# Stage: Lint
# Mengecek standar penulisan kode (ESLint)
lint_job:
  stage: lint
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run lint
  allow_failure: true
  only:
    - main
    - merge_requests

