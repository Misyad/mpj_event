services:
  mpj-event-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mpj-event-app:latest
    container_name: ${APP_NAME:-mpj-event-app}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Admin123!}
      DB_NAME: ${DB_NAME:-app_db}
      MPJ_EVENT_API_URL: ${MPJ_EVENT_API_URL:-http://mpj-event-api:4000}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-mpj-event-admin-token}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:11434/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-ollama}
      OPENAI_MODEL: ${OPENAI_MODEL:-llama3.2:3b}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mpj-event-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: mpj-event-api:latest
    container_name: ${API_NAME:-mpj-event-api}
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Admin123!}
      DB_NAME: ${DB_NAME:-app_db}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-mpj-event-admin-token}
    extra_hosts:
      - "host.docker.internal:host-gateway"
